upstream watchparty_app {
    server app:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # nginx serves file bytes here; Go just sets X-Accel-Redirect pointing to this location.
    # `internal` means the location is unreachable from the outside — only via X-Accel-Redirect.
    location /internal-files/ {
        internal;
        alias /media/;
        add_header Cache-Control "no-cache";
    }

    # Processed output produced by the pipeline: single MP4s and HLS packages.
    location /internal-processed/ {
        internal;
        alias /processed/;

        # Correct content types for HLS (Safari's native HLS is strict).
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t                    ts;
            video/mp4                     m4s;
            video/mp4                     mp4;
            text/vtt                      vtt;
        }
        default_type application/octet-stream;
        add_header Cache-Control "no-cache";
    }

    # WebSocket for watch-party rooms. Needs Upgrade/Connection passthrough and a
    # long read timeout (the app pings every 30s to keep it alive). Regex wins
    # over the /api/ prefix below. proxy_buffering off so messages aren't held.
    location ~ ^/api/rooms/[^/]+/ws$ {
        proxy_pass         http://watchparty_app;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_buffering    off;
    }

    # API → Go backend. The /stream endpoint replies with X-Accel-Redirect
    # pointing at one of the internal locations above, which nginx then serves.
    location /api/ {
        proxy_pass         http://watchparty_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";

        # Do not buffer — critical for streaming and large uploads.
        proxy_buffering         off;
        proxy_request_buffering off;

        # tus sends large PATCH chunks; don't cap the body size.
        client_max_body_size 0;
    }

    # Static SPA (built Svelte app). try_files falls back to index.html.
    location / {
        root      /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
