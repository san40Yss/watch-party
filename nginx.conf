upstream watchparty_app {
    server app:8080;
    keepalive 32;
}

# HLS media segments never change once packaged (a re-process is rare and
# rewrites them in place, so staleness is bounded by this TTL); playlists must
# always revalidate. Picks the Cache-Control per file type.
map $uri $media_cache {
    ~\.(ts|m4s|vtt|mp4)$ "public, max-age=3600";
    default              "no-cache";
}

server {
    listen 80;
    server_name _;

    # Compress the text-ish payloads: HLS playlists, WebVTT subtitles, the SPA
    # bundle and API JSON shrink several-fold. (Video segments are already
    # compressed data — gzip would just burn CPU.)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/vnd.apple.mpegurl text/vtt application/json application/javascript text/css text/plain image/svg+xml;

    # nginx serves file bytes here; Go just sets X-Accel-Redirect pointing to this location.
    # `internal` means the location is unreachable from the outside — only via X-Accel-Redirect.
    location /internal-files/ {
        internal;
        alias /media/;
        # External/VR players pick the demuxer by content type; the /stream URL
        # carries no extension, so type it from the target file's extension.
        types {
            video/mp4         mp4 m4v mov;
            video/x-matroska  mkv;
            video/mp2t        ts m2ts;
        }
        default_type application/octet-stream;
        add_header Cache-Control $media_cache;
    }

    # Processed output produced by the pipeline: single MP4s and HLS packages.
    location /internal-processed/ {
        internal;
        alias /processed/;

        # Correct content types for HLS (Safari's native HLS is strict).
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t                    ts;
            video/mp4                     m4s;
            video/mp4                     mp4;
            text/vtt                      vtt;
        }
        default_type application/octet-stream;
        add_header Cache-Control $media_cache;
    }

    # WebSocket for watch-party rooms. Needs Upgrade/Connection passthrough and a
    # long read timeout (the app pings every 30s to keep it alive). Regex wins
    # over the /api/ prefix below. proxy_buffering off so messages aren't held.
    location ~ ^/api/rooms/[^/]+/ws$ {
        proxy_pass         http://watchparty_app;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_buffering    off;
    }

    # API → Go backend. The /stream endpoint replies with X-Accel-Redirect
    # pointing at one of the internal locations above, which nginx then serves.
    location /api/ {
        proxy_pass         http://watchparty_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Do not buffer — critical for streaming and large uploads.
        proxy_buffering         off;
        proxy_request_buffering off;

        # tus sends large PATCH chunks; don't cap the body size.
        client_max_body_size 0;
    }

    # Vite emits content-hashed filenames — safe to cache forever.
    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Static SPA (built Svelte app). try_files falls back to index.html, which
    # must revalidate so a new deploy's asset hashes are picked up.
    location / {
        root      /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
